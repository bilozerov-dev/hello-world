<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>Hello World</title>
    <style>
      .alien-sticker {
        position: fixed;
        pointer-events: auto;
        z-index: 1000;
        animation: float 6s ease-in-out infinite;
        opacity: 0.8;
        cursor: pointer;
        transition: transform 0.1s;
      }

      .alien-sticker:hover {
        transform: scale(1.1);
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(5deg);
        }
      }

      .alien-sticker:nth-child(odd) {
        animation-direction: alternate-reverse;
      }

      @keyframes explode {
        0% {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
        50% {
          transform: scale(1.5) rotate(180deg);
          opacity: 0.5;
        }
        100% {
          transform: scale(0) rotate(360deg);
          opacity: 0;
        }
      }

      .exploding {
        animation: explode 0.5s ease-out forwards !important;
      }
    </style>
  </head>
  <body>
    <div class="cosmos-background">
      <!-- <div class="black-hole-moon moon-position"></div> -->
    </div>

    <!-- Alien Stickers -->
    <img
      src="https://openmoji.org/data/color/svg/1F47D.svg"
      class="alien-sticker"
      style="top: 10%; left: 5%; width: 60px"
      alt="👽"
    />
    <img
      src="https://openmoji.org/data/color/svg/1F47D.svg"
      class="alien-sticker"
      style="top: 15%; right: 10%; width: 45px; animation-delay: 1s"
      alt="👽"
    />
    <img
      src="https://openmoji.org/data/color/svg/1F47D.svg"
      class="alien-sticker"
      style="top: 60%; left: 8%; width: 50px; animation-delay: 2s"
      alt="👽"
    />
    <img
      src="https://openmoji.org/data/color/svg/1F47D.svg"
      class="alien-sticker"
      style="top: 30%; right: 20%; width: 48px; animation-delay: 2.5s"
      alt="👽"
    />
    <img
      src="https://openmoji.org/data/color/svg/1F47D.svg"
      class="alien-sticker"
      style="bottom: 10%; left: 20%; width: 52px; animation-delay: 3s"
      alt="👽"
    />
    <img
      src="https://openmoji.org/data/color/svg/1F47D.svg"
      class="alien-sticker"
      style="bottom: 15%; right: 8%; width: 58px; animation-delay: 0.8s"
      alt="👽"
    />

    <div class="content">
      <h1 class="hello-world">Hello, World!</h1>
      <p class="welcome-message">
        My name is Oleksii.<br />Not that I created it for any specific reason,
        <br />other than to say hi in a creative manner. Also... Help me get rid
        of these aliens!
      </p>
    </div>

    <script>
      document.querySelectorAll(".alien-sticker").forEach((alien) => {
        alien.addEventListener("click", function () {
          this.classList.add("exploding");
          setTimeout(() => {
            this.remove();
          }, 500);
        });
      });
    </script>
  </body>
</html>
