<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>Hello World</title>
    <style>
      .alien-sticker {
        position: fixed;
        pointer-events: auto;
        z-index: 1000;
        animation: float 6s ease-in-out infinite;
        opacity: 0.8;
        cursor: pointer;
        transition: transform 0.1s;
      }

      .alien-sticker:hover {
        transform: scale(1.1);
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(5deg);
        }
      }

      .alien-sticker:nth-child(odd) {
        animation-direction: alternate-reverse;
      }

      @keyframes explode {
        0% {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
        50% {
          transform: scale(1.5) rotate(180deg);
          opacity: 0.5;
        }
        100% {
          transform: scale(0) rotate(360deg);
          opacity: 0;
        }
      }

      .exploding {
        animation: explode 0.5s ease-out forwards !important;
      }

      .thanks-message {
        color: rgba(255, 255, 255, 0.8);
        text-align: center;
        opacity: 0;
        animation: fadeIn 1s ease-in forwards;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        background-color: #f0f;
        top: -10px;
        z-index: 999;
        animation: confetti-fall 3s linear forwards;
      }

      @keyframes confetti-fall {
        to {
          transform: translateY(100vh) rotate(720deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="cosmos-background">
      <!-- <div class="black-hole-moon moon-position"></div> -->
    </div>

    <!-- Alien Stickers -->
    <img
      src="https://openmoji.org/data/color/svg/1F47D.svg"
      class="alien-sticker"
      style="top: 10%; left: 5%; width: 60px"
      alt="👽"
    />
    <img
      src="https://openmoji.org/data/color/svg/1F47D.svg"
      class="alien-sticker"
      style="top: 15%; right: 10%; width: 45px; animation-delay: 1s"
      alt="👽"
    />
    <img
      src="https://openmoji.org/data/color/svg/1F47D.svg"
      class="alien-sticker"
      style="top: 60%; left: 8%; width: 50px; animation-delay: 2s"
      alt="👽"
    />
    <img
      src="https://openmoji.org/data/color/svg/1F47D.svg"
      class="alien-sticker"
      style="top: 75%; right: 15%; width: 55px; animation-delay: 0.5s"
      alt="👽"
    />
    <img
      src="https://openmoji.org/data/color/svg/1F47D.svg"
      class="alien-sticker"
      style="top: 40%; left: 12%; width: 40px; animation-delay: 1.5s"
      alt="👽"
    />
    <img
      src="https://openmoji.org/data/color/svg/1F47D.svg"
      class="alien-sticker"
      style="top: 30%; right: 20%; width: 48px; animation-delay: 2.5s"
      alt="👽"
    />
    <img
      src="https://openmoji.org/data/color/svg/1F47D.svg"
      class="alien-sticker"
      style="bottom: 10%; left: 20%; width: 52px; animation-delay: 3s"
      alt="👽"
    />
    <img
      src="https://openmoji.org/data/color/svg/1F47D.svg"
      class="alien-sticker"
      style="bottom: 15%; right: 8%; width: 58px; animation-delay: 0.8s"
      alt="👽"
    />

    <div class="content">
      <h1 class="hello-world">Hello, World!</h1>
      <p class="welcome-message">
        No specific reason for this page,<br />
        just saying hi.<br />
        Btw, can you help me get rid of these aliens?
      </p>
    </div>

    <script>
      let alienCount = document.querySelectorAll(".alien-sticker").length;

      document.querySelectorAll(".alien-sticker").forEach((alien) => {
        alien.addEventListener("click", function () {
          this.classList.add("exploding");
          alienCount--;

          setTimeout(() => {
            this.remove();

            // Check if all aliens are gone
            if (alienCount === 0) {
              celebrateVictory();
            }
          }, 500);
        });
      });

      function celebrateVictory() {
        // Add thanks message
        const content = document.querySelector(".content");
        const thanksMsg = document.createElement("p");
        thanksMsg.className = "thanks-message";
        thanksMsg.textContent = "Thanks!❤️";
        content.appendChild(thanksMsg);

        // Create confetti
        const colors = [
          "#ff0000",
          "#00ff00",
          "#0000ff",
          "#ffff00",
          "#ff00ff",
          "#00ffff",
          "#ffa500",
          "#ff1493",
        ];

        for (let i = 0; i < 100; i++) {
          setTimeout(() => {
            const confetti = document.createElement("div");
            confetti.className = "confetti";
            confetti.style.left = Math.random() * 100 + "%";
            confetti.style.backgroundColor =
              colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = Math.random() * 10 + 5 + "px";
            confetti.style.height = Math.random() * 10 + 5 + "px";
            confetti.style.animationDelay = Math.random() * 0.5 + "s";
            confetti.style.animationDuration = Math.random() * 2 + 2 + "s";

            document.body.appendChild(confetti);

            setTimeout(() => confetti.remove(), 4000);
          }, i * 30);
        }
      }
    </script>
  </body>
</html>
